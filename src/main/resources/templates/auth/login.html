<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | MindArena</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-panel">
        <div>
            <p class="eyebrow">Competitive social learning</p>
            <h1>Enter the arena</h1>
            <p class="lead">Join challenges, submit your thinking, and climb the leaderboard.</p>
        </div>

        <p class="flash" th:if="${message}" th:text="${message}"></p>
        <p class="flash error" th:if="${param.error}">Invalid email or password.</p>
        <p class="flash" th:if="${param.logout}">You have logged out.</p>

        <form class="form-stack" th:action="@{/login}" method="post">
            <label>Email
                <input type="email" name="username" required autofocus>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <button class="primary-button" type="submit">Login</button>
        </form>

        <p class="muted">No account yet? <a th:href="@{/register}">Create one</a></p>
    </section>
</main>
</body>
</html>
