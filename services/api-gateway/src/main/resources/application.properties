spring.application.name=mindarena-api-gateway
server.port=${PORT:8080}

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=identity-service
spring.cloud.gateway.routes[0].uri=lb://mindarena-identity-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/identity/**

spring.cloud.gateway.routes[1].id=challenge-service
spring.cloud.gateway.routes[1].uri=lb://mindarena-challenge-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/challenges/**

spring.cloud.gateway.routes[2].id=ranking-service
spring.cloud.gateway.routes[2].uri=lb://mindarena-ranking-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/leaderboards/**

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=lb://mindarena-notification-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[4].id=submission-service
spring.cloud.gateway.routes[4].uri=lb://mindarena-submission-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/submissions/**

spring.cloud.gateway.routes[5].id=chat-service
spring.cloud.gateway.routes[5].uri=lb://mindarena-chat-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/chat/**

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true,gateway,prometheus
management.endpoint.health.probes.enabled=true
