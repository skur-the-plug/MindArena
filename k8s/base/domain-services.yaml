apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: mindarena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: identity
          image: mindarena/identity-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: mindarena-identity-service
            - name: EUREKA_DEFAULT_ZONE
              valueFrom:
                configMapKeyRef:
                  name: mindarena-config
                  key: eureka-default-zone
            - name: DB_URL
              value: jdbc:mariadb://db:3306/mindarena_identity
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mindarena-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mindarena-secrets
                  key: db-password
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: mindarena
spec:
  selector:
    app: identity
  ports:
    - port: 8080
      targetPort: 8080
---
