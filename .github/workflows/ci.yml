name: CI

on:
  push:
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Test legacy app with coverage
        run: mvn -B verify
      - name: Build microservices
        run: bash scripts/build-microservices.sh
      - name: SonarCloud analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          -Dsonar.host.url=${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      - name: Prepare security report directory
        run: mkdir -p reports/dependency-check
      - name: Cache OWASP Dependency Check data
        if: ${{ env.NVD_API_KEY != '' }}
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: dependency-check-data-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            dependency-check-data-${{ runner.os }}-
      - name: OWASP dependency check
        if: ${{ env.NVD_API_KEY != '' }}
        run: >
          mvn -B org.owasp:dependency-check-maven:check
          -Dformat=SARIF
          -DoutputDirectory=reports/dependency-check
          -DdataDirectory=.dependency-check-data
          -DfailBuildOnCVSS=7
          -DenableRetired=true
          -DnvdApiKey="${NVD_API_KEY}"
      - name: Dependency vulnerability scan
        if: ${{ env.NVD_API_KEY == '' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: reports/dependency-check/dependency-check-report.sarif
          severity: HIGH,CRITICAL
          scanners: vuln
          exit-code: "0"
      - name: Upload dependency scan SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('reports/dependency-check/dependency-check-report.sarif') != ''
        with:
          sarif_file: reports/dependency-check/dependency-check-report.sarif
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
