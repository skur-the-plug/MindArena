name: CI

on:
  push:
  pull_request:

jobs:
  microservices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build legacy app
        run: mvn -q test
      - name: Build microservices
        run: bash scripts/build-microservices.sh
