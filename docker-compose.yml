services:
  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: mindarena
      MARIADB_USER: mindarena
      MARIADB_PASSWORD: mindarena123
      MARIADB_ROOT_PASSWORD: mindarena_root
    volumes:
      - mindarena-db:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - mindarena-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: mindarena
      RABBITMQ_DEFAULT_PASS: mindarena123
    ports:
      - "15672:15672"
    volumes:
      - mindarena-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery:
    build: ./services/discovery-server
    ports:
      - "8761:8761"

  config:
    build: ./services/config-server
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
    ports:
      - "8888:8888"
    depends_on:
      discovery:
        condition: service_started

  gateway:
    build: ./services/api-gateway
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
    ports:
      - "8082:8080"
    depends_on:
      discovery:
        condition: service_started

  ranking:
    build: ./services/ranking-service
    environment:
      SERVICE_NAME: mindarena-ranking-service
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      DB_URL: jdbc:mariadb://db:3306/mindarena_ranking
      DB_USERNAME: mindarena
      DB_PASSWORD: mindarena123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery:
        condition: service_started

  identity:
    build: ./services/identity-service
    environment:
      SERVICE_NAME: mindarena-identity-service
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      DB_URL: jdbc:mariadb://db:3306/mindarena_identity
      DB_USERNAME: mindarena
      DB_PASSWORD: mindarena123
    depends_on:
      db:
        condition: service_healthy
      discovery:
        condition: service_started

  challenge:
    build: ./services/challenge-service
    environment:
      SERVICE_NAME: mindarena-challenge-service
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      DB_URL: jdbc:mariadb://db:3306/mindarena_challenge
      DB_USERNAME: mindarena
      DB_PASSWORD: mindarena123
    depends_on:
      db:
        condition: service_healthy
      discovery:
        condition: service_started

  notification:
    build: ./services/notification-service
    environment:
      SERVICE_NAME: mindarena-notification-service
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      DB_URL: jdbc:mariadb://db:3306/mindarena_notification
      DB_USERNAME: mindarena
      DB_PASSWORD: mindarena123
    depends_on:
      db:
        condition: service_healthy
      discovery:
        condition: service_started

  submission:
    build: ./services/submission-service
    environment:
      SERVICE_NAME: mindarena-submission-service
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      DB_URL: jdbc:mariadb://db:3306/mindarena_submission
      DB_USERNAME: mindarena
      DB_PASSWORD: mindarena123
    depends_on:
      db:
        condition: service_healthy
      discovery:
        condition: service_started

  chat:
    build: ./services/chat-service
    environment:
      SERVICE_NAME: mindarena-chat-service
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      DB_URL: jdbc:mariadb://db:3306/mindarena_chat
      DB_USERNAME: mindarena
      DB_PASSWORD: mindarena123
    depends_on:
      db:
        condition: service_healthy
      discovery:
        condition: service_started

  app:
    profiles: ["legacy-ui"]
    build: .
    environment:
      SERVICE_NAME: mindarena-app
      EUREKA_ENABLED: true
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      DB_URL: jdbc:mariadb://db:3306/mindarena
      DB_USERNAME: mindarena
      DB_PASSWORD: mindarena123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: mindarena
      RABBITMQ_PASSWORD: mindarena123
    ports:
      - "8081:8080"
    volumes:
      - mindarena-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery:
        condition: service_started

volumes:
  mindarena-db:
  mindarena-redis:
  mindarena-rabbitmq:
  mindarena-uploads:
